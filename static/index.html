        function positionTutorialBox(step) {
            const box = document.getElementById('tutorial-box');
            const margin = 15;
            const isMobile = window.innerWidth <= 600;

            if (isMobile && step.elementId === 'info') {
                box.style.top = '';
                box.style.left = '';
                box.style.right = '';
                box.style.bottom = '';
                box.style.transform = '';
                return; 
            }

            if (isMobile) {
                box.style.top = '50%';
                box.style.left = '50%';
                box.style.right = 'auto';
                box.style.bottom = 'auto';
                box.style.transform = 'translate(-50%, -50%)';
                return; 
            }

            if (step.placement === 'center' || !step.elementId) {
                box.style.top = '50%';
                box.style.left = '50%';
                box.style.right = 'auto';
                box.style.bottom = 'auto';
                box.style.transform = 'translate(-50%, -50%)';
                return;
            }

            const targetElement = document.getElementById(step.elementId);
            if (!targetElement) {
                positionTutorialBox({ placement: 'center' }); 
                return;
            }

            const rect = targetElement.getBoundingClientRect();
            let top, left;
            
            setTimeout(() => {
                const boxRect = box.getBoundingClientRect();

                switch (step.placement) {
                    case 'top-right':
                        top = rect.top - boxRect.height - margin;
                        left = rect.right - boxRect.width;
                        break;
                    case 'top-left':
                        top = rect.top - boxRect.height - margin;
                        left = rect.left;
                        break;
                    case 'right':
                        top = rect.top;
                        left = rect.right + margin;
                        break;
                    case 'bottom-left':
                        top = rect.bottom + margin;
                        left = rect.left;
                        break;
                    default:
                        top = window.innerHeight / 2 - boxRect.height / 2;
                        left = window.innerWidth / 2 - boxRect.width / 2;
                }

                if (left + boxRect.width > window.innerWidth) {
                    left = window.innerWidth - boxRect.width - margin;
                }
                if (left < 0) {
                    left = margin;
                }
                if (top < 0) {
                    top = margin;
                }
                if (top + boxRect.height > window.innerHeight) {
                    top = window.innerHeight - boxRect.height - margin;
                }

                box.style.top = `${top}px`;
                box.style.left = `${left}px`;
                box.style.right = 'auto';
                box.style.bottom = 'auto';
                box.style.transform = 'none';
            }, 0);

        function scheduleTutorial() {
            const loadingScreen = document.getElementById('loading-screen');
            if (!loadingScreen) return;
            const observer = new MutationObserver((mutationsList, obs) => {
                for(const mutation of mutationsList) {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                        if (loadingScreen.style.display === 'none') {
                            setTimeout(startTutorial, 1500);
                            obs.disconnect();
                            return;
                        }
                    }
                }
            });
            observer.observe(loadingScreen, { attributes: true });
        }
        
        // FIXED SYNTAX ERROR HERE
        function updateSoldStarsStatus() {
            fetch('/stars', { cache: 'no-store' })
                .then(res => {
                    if (res.ok) return res.json();
                    console.error('Error refreshing star status:', res.status);
                    return Promise.reject('Refresh error');
                })
                .then(freshStarsData => {
                    console.log('Refreshed star status.');
                    let updatedCount = 0;
                    freshStarsData.forEach(starData => {
                        const saoNumber = starData.name.replace("SAO", "").trim();
                        const starObject = starsBySAO[saoNumber];
                        
                        if (starObject && starObject.userData.is_sold !== starData.is_sold) {
                            starObject.userData.is_sold = starData.is_sold;
                            starObject.userData.star_name = starData.star_name;
                            starObject.userData.customer_name = starData.customer_name;
                            updatedCount++;
                        }
                    });
                    if (updatedCount > 0) {
                        console.log(`Updated status for ${updatedCount} stars.`);
                        if (selectedStar && selectedStar.userData.is_sold) {
                            showInfo(selectedStar);
                        }
                    }
                })
                .catch(e => {
                    if (e !== 'Refresh error') { 
                        console.error('Could not refresh star status:', e);
                    }
                });
        }
        
        const loadingScreenObserver = new MutationObserver((mutations, observer) => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen && loadingScreen.style.display === 'none') {
                console.log('Application loaded. Starting periodic star status refresh (every 10 seconds).');
                setInterval(updateSoldStarsStatus, 10000); 
                observer.disconnect(); 
            }
        });
        
        loadingScreenObserver.observe(document.body, { childList: true, subtree: true });

        scheduleTutorial();

        function setupZenMode() {
            const enterZenButton = document.getElementById('enter-zen-mode');
            const exitZenButton = document.getElementById('exit-zen-mode');
            const body = document.body;

            enterZenButton.addEventListener('click', () => {
                body.classList.add('zen-mode');
            });

            exitZenButton.addEventListener('click', () => {
                body.classList.remove('zen-mode');
            });
        }
    </script>
</body>
</html>
