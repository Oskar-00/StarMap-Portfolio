<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Map Portfolio</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <!-- === LEAFLET MAP STYLES === -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Arial', sans-serif; 
            position: relative;
            touch-action: none;
        }
        canvas { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100vh; 
            display: block; 
        }
        #shooting-star-canvas {
            z-index: 99;
            pointer-events: none;
        }
        #info, #star-info, #search-input, #search-button, #time-picker-container {
            font-family: 'Poppins', sans-serif;
        }

        #info { 
            position: fixed;
            top: 20px; 
            left: 20px; 
            color: #e0e7ff; 
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 12px 30px 12px 15px; 
            border-radius: 10px; 
            display: none; 
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1); 
            white-space: normal; 
            word-wrap: break-word;
            z-index: 101; 
            pointer-events: auto; 
            max-width: 320px; 
            line-height: 1.5; 
            backdrop-filter: blur(5px); 
            transition: all 0.3s ease;
        }

        #star-info {
            display: none;
        }

        #star-image {
            position: fixed;
            top: 230px; 
            left: 20px;
            color: #e0e7ff;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 10px; 
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            z-index: 101;
            pointer-events: auto;
            max-width: 240px; 
            line-height: 1.5;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #info:hover { 
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15); 
            transform: translateY(-2px); 
        }
        #info-content { 
            font-size: 14px; 
        }
        #info-content b { 
            color: #c0d0ff; 
            font-weight: 600; 
        }
        #star-info {
            position: fixed;
            top: 100px;
            left: 20px;
            color: #e0e7ff;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 15px 30px 15px 15px;
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            white-space: normal;
            word-wrap: break-word;
            z-index: 101;
            pointer-events: auto;
            max-width: 320px;
            line-height: 1.5;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #star-info:hover {
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #star-info-content {
            font-size: 14px;
        }
        #star-info-content b {
            color: #c0d0ff;
            font-weight: 600;
        }
        #star-image {
            position: fixed;
            top: 340px; 
            left: 20px;
            color: #e0e7ff;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 15px 30px 15px 15px;
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            z-index: 101;
            pointer-events: auto;
            max-width: 320px;
            line-height: 1.5;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #star-image:hover {
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #star-image img {
            width: 100%;
            max-width: 190px; 
            height: auto;
            border-radius: 8px;
            border: 2px solid rgba(100, 150, 255, 0.5);
            box-shadow: 0 0 10px rgba(100, 150, 255, 0.3);
            display: block;
            margin: 10px auto;
            transition: transform 0.3s ease;
        }
        #star-image img:hover {
            transform: scale(1.05);
        }
        #star-image h3 {
            margin: 0 0 8px 0; 
            font-size: 16px; 
            text-align: center;
            color: #c0e0ff;
            font-weight: 500;
            text-shadow: 0 0 5px rgba(100, 150, 255, 0.3);
        }
        .close-button {
            position: absolute;
            top: 5px;
            right: 5px;
            color: rgba(150, 180, 255, 0.7);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            background: none;
            border: none;
            padding: 5px;
            z-index: 13;
        }
        .close-button:hover {
            color: rgba(255, 255, 255, 1);
            transform: scale(1.2) rotate(90deg);
        }
        #search-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            border-radius: 20px;
            padding: 5px 12px 5px 15px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 101;
            pointer-events: auto;
            max-width: 220px;
            backdrop-filter: blur(5px);
            gap: 8px;
        }
        #search-container:hover, #search-container:focus-within {
            background: linear-gradient(145deg, rgba(15, 20, 50, 0.9), rgba(25, 35, 70, 0.8));
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #search-input {
            background: transparent;
            border: none;
            color: #e0e7ff;
            padding: 5px;
            outline: none;
            font-size: 14px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            flex-grow: 1;
            width: auto;
            min-width: 0;
        }
        #search-input::placeholder {
            color: rgba(150, 180, 255, 0.7);
        }
        #search-button {
            background: rgba(80, 100, 200, 0.7);
            color: #e0e7ff;
            border: none;
            border-radius: 15px;
            padding: 5px 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            flex-shrink: 0;
        }
        #search-button:hover {
            background: rgba(100, 120, 255, 0.9);
            transform: scale(1.05);
        }
        #search-result {
            position: fixed;
            top: 70px;
            right: 20px;
            color: #e0e7ff;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 10px;
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            text-align: center;
            z-index: 101;
            pointer-events: auto;
            max-width: 320px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #search-result:hover {
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, #04060B, #0A0D14, #101214);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-family: 'Arial', sans-serif;
            transition: opacity 1s ease;
        }
        #loading-logo {
            max-width: 190px;
            height: auto;
            margin-bottom: 20px;
            display: block;
            object-fit: contain;
            animation: pulse 2s ease-in-out infinite;
        }
        #loading-screen h2 {
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(100, 100, 255, 0.5);
            text-align: center;
        }
        #progress-container {
            width: 80%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #progress-bar-container {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(100, 100, 255, 0.3);
            margin-top: 10px;
        }
        #progress-bar {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #4a6cd4, #88aaff);
            transition: width 0.3s ease;
        }
        #progress-text {
            margin-top: 10px;
            font-size: 16px;
            color: #e0e7ff;
        }
        #quote-display {
            margin-top: 25px;
            font-style: italic;
            color: rgba(224, 231, 255, 0.7);
            max-width: 400px;
            text-align: center;
            font-size: 14px;
            transition: opacity 0.5s ease;
            height: 3em;
        }
        
        #time-picker-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: auto;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            z-index: 101;
            pointer-events: auto;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 8px; 
            max-width: 240px; 
            touch-action: auto; 
        }

        #time-picker-container:hover {
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #datetime-picker, #date-picker, #time-picker-fallback {
            background: transparent;
            border: 1px solid rgba(100, 150, 255, 0.5);
            color: #e0e7ff;
            padding: 5px;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            outline: none;
            width: 100%;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        #datetime-picker:focus, #date-picker:focus, #time-picker-fallback:focus {
            border-color: #88aaff;
            box-shadow: 0 0 5px rgba(100, 150, 255, 0.5);
        }
        #slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #hour-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            background: rgba(100, 150, 255, 0.3);
            outline: none;
            border-radius: 5px;
            touch-action: auto;
        }
        #hour-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #88aaff;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        #hour-slider::-webkit-slider-thumb:hover {
            background: #a0c0ff;
        }
        #hour-slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: #88aaff;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        #hour-slider::-moz-range-thumb:hover {
            background: #a0c0ff;
        }
        #real-time-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        #real-time-button:hover {
            transform: scale(1.1);
        }
        #real-time-button svg {
            width: 20px;
            height: 20px;
            fill: #a0c0ff;
        }
        #location-display-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }
        #time-display {
            color: #e0e7ff;
            font-size: 14px;
            text-align: center;
            flex-grow: 1;
        }
        #open-location-modal {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        #open-location-modal:hover {
             transform: scale(1.1);
        }
        #open-location-modal svg {
            width: 16px;
            height: 16px;
            fill: #a0c0ff;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        #constellation-controls {
            position: fixed !important;
            bottom: 20px  !important;
            left: 20px   !important;
            transform: none  !important;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2);
            z-index: 101;
            display: flex;
            align-items: center;
            gap: 9px;
            color: #e0e7ff;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-size: 11.5px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 58px;
            height: 28px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 21px;
            width: 21px;
            left: 3.5px;
            bottom: 3.5px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(100, 100, 100, 0.5);
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #88aaff;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        /* === LOCATION MODAL STYLES === */
        .hidden {
            display: none !important;
        }
        #location-modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1500;
        }
        #location-modal {
            background: linear-gradient(145deg, rgba(15, 25, 55, 0.95), rgba(25, 35, 75, 0.9));
            color: #e0e7ff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 8px 30px rgba(100, 150, 255, 0.25);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #location-modal h3 {
            margin: 0;
            text-align: center;
            font-weight: 500;
            color: #c0d0ff;
        }
        #location-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        #location-search-form {
            flex-grow: 1; display: flex;
        }
        #location-search {
            flex-grow: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(100, 150, 255, 0.5);
            color: #e0e7ff;
            padding: 8px;
            border-radius: 5px 0 0 5px;
            outline: none;
        }
        #location-search-btn {
            padding: 8px 12px;
            border: 1px solid rgba(100, 150, 255, 0.5);
            border-left: none;
            background: rgba(80, 100, 200, 0.7);
            color: #e0e7ff;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
        }
        #autolocate-btn {
            padding: 8px 12px;
            border: 1px solid rgba(100, 150, 255, 0.5);
            background: transparent;
            color: #e0e7ff;
            cursor: pointer;
            border-radius: 5px;
        }
        #location-map {
            width: 100%;
            height: 40vh;
            min-height: 250px;
            border-radius: 8px;
            background-color: #05080f;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }
        #location-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        #use-location-btn {
            padding: 10px 20px;
            border: none;
            background: #4A90E2;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        #location-modal .close-button {
            top: 10px; right: 10px;
        }

        /* === TUTORIAL STYLES === */
        #tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1999;
            backdrop-filter: blur(2px);
        }

        #tutorial-box {
            position: fixed;
            z-index: 2100;
            background: linear-gradient(145deg, rgba(15, 25, 55, 0.95), rgba(25, 35, 75, 0.9));
            color: #e0e7ff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 8px 30px rgba(100, 150, 255, 0.25);
            max-width: 320px;
            font-size: 15px;
            line-height: 1.6;
            pointer-events: auto;
            transition: all 0.4s ease-in-out;
        }
        .tutorial-highlight {
            box-shadow: 0 0 0 3px rgba(136, 170, 255, 0.7), 0 0 20px rgba(136, 170, 255, 0.5);
            transition: box-shadow 0.3s ease-in-out;
            border-radius: 12px;
            pointer-events: auto;
        }
        #tutorial-box::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }
        #tutorial-content {
            margin-bottom: 15px;
        }
        #tutorial-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(100, 150, 255, 0.2);
            padding-top: 15px;
        }
        #tutorial-skip, #tutorial-next {
            background: transparent;
            border: 1px solid rgba(150, 180, 255, 0.7);
            color: rgba(200, 220, 255, 0.9);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #tutorial-skip:hover, #tutorial-next:hover {
            background: rgba(100, 150, 255, 0.3);
            border-color: #a0c0ff;
            color: #fff;
        }
        #tutorial-next {
            background: rgba(80, 120, 220, 0.5);
        }
        #tutorial-step-counter {
            font-size: 12px;
            color: rgba(200, 220, 255, 0.6);
        }
        .arrow-bottom::after {
            bottom: -10px; left: 30px;
            border-width: 10px 10px 0 10px;
            border-color: rgba(25, 35, 75, 0.9) transparent transparent transparent;
        }
        .arrow-top-right::after {
            top: -10px; right: 30px;
            border-width: 0 10px 10px 10px;
            border-color: transparent transparent rgba(25, 35, 75, 0.9) transparent;
        }
        .arrow-top-left::after {
            top: -10px; left: 30px;
            border-width: 0 10px 10px 10px;
            border-color: transparent transparent rgba(25, 35, 75, 0.9) transparent;
        }
        .arrow-right::after {
            right: -10px; top: 30px;
            border-width: 10px 0 10px 10px;
            border-color: transparent transparent transparent rgba(25, 35, 75, 0.9);
        }
        
        #enter-zen-mode {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 28px;
            height: 28px;
            background: rgba(80, 100, 200, 0.7);
            border: 1px solid rgba(100, 150, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        #enter-zen-mode:hover {
            background: rgba(100, 120, 255, 0.9);
            transform: scale(1.1);
        }
        #enter-zen-mode svg {
            width: 14px;
            height: 14px;
            fill: #e0e7ff;
        }

        #exit-zen-mode {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
            transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
        }
        #exit-zen-mode:hover {

             transform: scale(1.05);
        }
        #exit-zen-mode svg {
            width: 18px;
            height: 18px;
            fill: #e0e7ff;
        }

        /* Hiding/Showing Logic */
        body.zen-mode #search-container,
        body.zen-mode #constellation-controls,
        body.zen-mode #time-picker-container {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(0.9);
        }
        body.zen-mode #exit-zen-mode {
            opacity: 1;
            visibility: visible;
            transform: scale(1);

                font-size: 11px !important;
                padding: 3px !important;
                flex-grow: 1;
                min-width: 0;
            }
            
            #search-button { 
                font-size: 10px !important;
                padding: 3px 6px !important;
                flex-shrink: 0;
            }
            
            #search-result { 
                top: 50px !important;
                right: 5px !important;
                max-width: 120px !important;
                font-size: 11px !important;
                text-align: center;
            }
            
            .close-button { font-size: 16px; }
            #loading-logo { max-width: 150px; }
            #loading-screen h2 { font-size: 18px; }
            #progress-container { width: 200px; }
            #datetime-picker, #date-picker, #time-picker-fallback { font-size: 12px; padding: 3px; }
            #hour-slider { height: 6px; }
            #hour-slider::-webkit-slider-thumb { width: 20px; height: 20px; }
            #hour-slider::-moz-range-thumb { width: 20px; height: 20px; }
            #time-display { font-size: 12px; }

            #time-picker-container {
                bottom: 5px !important;
                right: 5px !important; 
                left: auto !important;
                transform: scale(0.75);
                transform-origin: bottom right;
            }
            #constellation-controls {
                padding: 6px 10px;
                bottom: 5px !important;
                left: 5px !important;   
                right: auto !important;
                transform: scale(0.7);
                transform-origin: bottom left;
            }

            #tutorial-box {
                max-width: 220px !important; 
                font-size: 12px !important; 
                padding: 12px !important;    
                line-height: 1.4 !important;
            }

            #tutorial-nav {
                padding-top: 10px !important;
            }

            #tutorial-skip, #tutorial-next {
                padding: 4px 8px !important; 
                font-size: 11px !important; 
            }

            #tutorial-step-counter {
                font-size: 10px !important; 
            }
