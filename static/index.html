<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Map Portfolio</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <!-- === LEAFLET MAP STYLES === -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Arial', sans-serif; 
            position: relative;
            touch-action: none;
        }
        canvas { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100vh; 
            display: block; 
        }
        #shooting-star-canvas {
            z-index: 99;
            pointer-events: none;
        }
        #info, #star-info, #search-input, #search-button, #time-picker-container {
            font-family: 'Poppins', sans-serif;
        }

        #info { 
            position: fixed;
            top: 20px; 
            left: 20px; 
            color: #e0e7ff; 
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 12px 30px 12px 15px; 
            border-radius: 10px; 
            display: none; 
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1); 
            white-space: normal; 
            word-wrap: break-word;
            z-index: 101; 
            pointer-events: auto; 
            max-width: 320px; 
            line-height: 1.5; 
            backdrop-filter: blur(5px); 
            transition: all 0.3s ease;
        }

        #star-info {
            display: none;
        }

        #star-image {
            position: fixed;
            top: 230px; 
            left: 20px;
            color: #e0e7ff;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 10px; 
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            z-index: 101;
            pointer-events: auto;
            max-width: 240px; 
            line-height: 1.5;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #info:hover { 
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15); 
            transform: translateY(-2px); 
        }
        #info-content { 
            font-size: 14px; 
        }
        #info-content b { 
            color: #c0d0ff; 
            font-weight: 600; 
        }
        #star-info {
            position: fixed;
            top: 100px;
            left: 20px;
            color: #e0e7ff;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 15px 30px 15px 15px;
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            white-space: normal;
            word-wrap: break-word;
            z-index: 101;
            pointer-events: auto;
            max-width: 320px;
            line-height: 1.5;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #star-info:hover {
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #star-info-content {
            font-size: 14px;
        }
        #star-info-content b {
            color: #c0d0ff;
            font-weight: 600;
        }
        #star-image {
            position: fixed;
            top: 340px; 
            left: 20px;
            color: #e0e7ff;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 15px 30px 15px 15px;
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            z-index: 101;
            pointer-events: auto;
            max-width: 320px;
            line-height: 1.5;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #star-image:hover {
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #star-image img {
            width: 100%;
            max-width: 190px; 
            height: auto;
            border-radius: 8px;
            border: 2px solid rgba(100, 150, 255, 0.5);
            box-shadow: 0 0 10px rgba(100, 150, 255, 0.3);
            display: block;
            margin: 10px auto;
            transition: transform 0.3s ease;
        }
        #star-image img:hover {
            transform: scale(1.05);
        }
        #star-image h3 {
            margin: 0 0 8px 0; 
            font-size: 16px; 
            text-align: center;
            color: #c0e0ff;
            font-weight: 500;
            text-shadow: 0 0 5px rgba(100, 150, 255, 0.3);
        }
        .close-button {
            position: absolute;
            top: 5px;
            right: 5px;
            color: rgba(150, 180, 255, 0.7);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
            background: none;
            border: none;
            padding: 5px;
            z-index: 13;
        }
        .close-button:hover {
            color: rgba(255, 255, 255, 1);
            transform: scale(1.2) rotate(90deg);
        }
        #search-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            border-radius: 20px;
            padding: 5px 12px 5px 15px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 101;
            pointer-events: auto;
            max-width: 220px;
            backdrop-filter: blur(5px);
            gap: 8px;
        }
        #search-container:hover, #search-container:focus-within {
            background: linear-gradient(145deg, rgba(15, 20, 50, 0.9), rgba(25, 35, 70, 0.8));
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #search-input {
            background: transparent;
            border: none;
            color: #e0e7ff;
            padding: 5px;
            outline: none;
            font-size: 14px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            flex-grow: 1;
            width: auto;
            min-width: 0;
        }
        #search-input::placeholder {
            color: rgba(150, 180, 255, 0.7);
        }
        #search-button {
            background: rgba(80, 100, 200, 0.7);
            color: #e0e7ff;
            border: none;
            border-radius: 15px;
            padding: 5px 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            flex-shrink: 0;
        }
        #search-button:hover {
            background: rgba(100, 120, 255, 0.9);
            transform: scale(1.05);
        }
        #search-result {
            position: fixed;
            top: 70px;
            right: 20px;
            color: #e0e7ff;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 10px;
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            text-align: center;
            z-index: 101;
            pointer-events: auto;
            max-width: 320px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #search-result:hover {
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, #04060B, #0A0D14, #101214);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-family: 'Arial', sans-serif;
            transition: opacity 1s ease;
        }
        #loading-logo {
            max-width: 190px;
            height: auto;
            margin-bottom: 20px;
            display: block;
            object-fit: contain;
            animation: pulse 2s ease-in-out infinite;
        }
        #loading-screen h2 {
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(100, 100, 255, 0.5);
            text-align: center;
        }
        #progress-container {
            width: 80%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #progress-bar-container {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(100, 100, 255, 0.3);
            margin-top: 10px;
        }
        #progress-bar {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #4a6cd4, #88aaff);
            transition: width 0.3s ease;
        }
        #progress-text {
            margin-top: 10px;
            font-size: 16px;
            color: #e0e7ff;
        }
        #quote-display {
            margin-top: 25px;
            font-style: italic;
            color: rgba(224, 231, 255, 0.7);
            max-width: 400px;
            text-align: center;
            font-size: 14px;
            transition: opacity 0.5s ease;
            height: 3em;
        }
        
        #time-picker-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: auto;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2), 0 0 20px rgba(100, 150, 255, 0.1);
            z-index: 101;
            pointer-events: auto;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 8px; 
            max-width: 240px; 
            touch-action: auto; 
        }

        #time-picker-container:hover {
            box-shadow: 0 6px 20px rgba(100, 150, 255, 0.3), 0 0 25px rgba(100, 150, 255, 0.15);
            transform: translateY(-2px);
        }
        #datetime-picker, #date-picker, #time-picker-fallback {
            background: transparent;
            border: 1px solid rgba(100, 150, 255, 0.5);
            color: #e0e7ff;
            padding: 5px;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            outline: none;
            width: 100%;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        #datetime-picker:focus, #date-picker:focus, #time-picker-fallback:focus {
            border-color: #88aaff;
            box-shadow: 0 0 5px rgba(100, 150, 255, 0.5);
        }
        #slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #hour-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            background: rgba(100, 150, 255, 0.3);
            outline: none;
            border-radius: 5px;
            touch-action: auto;
        }
        #hour-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #88aaff;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        #hour-slider::-webkit-slider-thumb:hover {
            background: #a0c0ff;
        }
        #hour-slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: #88aaff;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        #hour-slider::-moz-range-thumb:hover {
            background: #a0c0ff;
        }
        #real-time-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        #real-time-button:hover {
            transform: scale(1.1);
        }
        #real-time-button svg {
            width: 20px;
            height: 20px;
            fill: #a0c0ff;
        }
        #location-display-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }
        #time-display {
            color: #e0e7ff;
            font-size: 14px;
            text-align: center;
            flex-grow: 1;
        }
        #open-location-modal {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        #open-location-modal:hover {
             transform: scale(1.1);
        }
        #open-location-modal svg {
            width: 16px;
            height: 16px;
            fill: #a0c0ff;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        #constellation-controls {
            position: fixed !important;
            bottom: 20px  !important;
            left: 20px   !important;
            transform: none  !important;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2);
            z-index: 101;
            display: flex;
            align-items: center;
            gap: 9px;
            color: #e0e7ff;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-size: 11.5px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 58px;
            height: 28px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 21px;
            width: 21px;
            left: 3.5px;
            bottom: 3.5px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(100, 100, 100, 0.5);
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #88aaff;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        /* === LOCATION MODAL STYLES === */
        .hidden {
            display: none !important;
        }
        #location-modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1500;
        }
        #location-modal {
            background: linear-gradient(145deg, rgba(15, 25, 55, 0.95), rgba(25, 35, 75, 0.9));
            color: #e0e7ff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 8px 30px rgba(100, 150, 255, 0.25);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #location-modal h3 {
            margin: 0;
            text-align: center;
            font-weight: 500;
            color: #c0d0ff;
        }
        #location-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        #location-search-form {
            flex-grow: 1; display: flex;
        }
        #location-search {
            flex-grow: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(100, 150, 255, 0.5);
            color: #e0e7ff;
            padding: 8px;
            border-radius: 5px 0 0 5px;
            outline: none;
        }
        #location-search-btn {
            padding: 8px 12px;
            border: 1px solid rgba(100, 150, 255, 0.5);
            border-left: none;
            background: rgba(80, 100, 200, 0.7);
            color: #e0e7ff;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
        }
        #autolocate-btn {
            padding: 8px 12px;
            border: 1px solid rgba(100, 150, 255, 0.5);
            background: transparent;
            color: #e0e7ff;
            cursor: pointer;
            border-radius: 5px;
        }
        #location-map {
            width: 100%;
            height: 40vh;
            min-height: 250px;
            border-radius: 8px;
            background-color: #05080f;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }
        #location-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        #use-location-btn {
            padding: 10px 20px;
            border: none;
            background: #4A90E2;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        #location-modal .close-button {
            top: 10px; right: 10px;
        }

        /* === TUTORIAL STYLES === */
        #tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1999;
            backdrop-filter: blur(2px);
        }

        #tutorial-box {
            position: fixed;
            z-index: 2100;
            background: linear-gradient(145deg, rgba(15, 25, 55, 0.95), rgba(25, 35, 75, 0.9));
            color: #e0e7ff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 8px 30px rgba(100, 150, 255, 0.25);
            max-width: 320px;
            font-size: 15px;
            line-height: 1.6;
            pointer-events: auto;
            transition: all 0.4s ease-in-out;
        }
        .tutorial-highlight {
            box-shadow: 0 0 0 3px rgba(136, 170, 255, 0.7), 0 0 20px rgba(136, 170, 255, 0.5);
            transition: box-shadow 0.3s ease-in-out;
            border-radius: 12px;
            pointer-events: auto;
        }
        #tutorial-box::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }
        #tutorial-content {
            margin-bottom: 15px;
        }
        #tutorial-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(100, 150, 255, 0.2);
            padding-top: 15px;
        }
        #tutorial-skip, #tutorial-next {
            background: transparent;
            border: 1px solid rgba(150, 180, 255, 0.7);
            color: rgba(200, 220, 255, 0.9);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #tutorial-skip:hover, #tutorial-next:hover {
            background: rgba(100, 150, 255, 0.3);
            border-color: #a0c0ff;
            color: #fff;
        }
        #tutorial-next {
            background: rgba(80, 120, 220, 0.5);
        }
        #tutorial-step-counter {
            font-size: 12px;
            color: rgba(200, 220, 255, 0.6);
        }
        .arrow-bottom::after {
            bottom: -10px; left: 30px;
            border-width: 10px 10px 0 10px;
            border-color: rgba(25, 35, 75, 0.9) transparent transparent transparent;
        }
        .arrow-top-right::after {
            top: -10px; right: 30px;
            border-width: 0 10px 10px 10px;
            border-color: transparent transparent rgba(25, 35, 75, 0.9) transparent;
        }
        .arrow-top-left::after {
            top: -10px; left: 30px;
            border-width: 0 10px 10px 10px;
            border-color: transparent transparent rgba(25, 35, 75, 0.9) transparent;
        }
        .arrow-right::after {
            right: -10px; top: 30px;
            border-width: 10px 0 10px 10px;
            border-color: transparent transparent transparent rgba(25, 35, 75, 0.9);
        }
        
        #enter-zen-mode {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 28px;
            height: 28px;
            background: rgba(80, 100, 200, 0.7);
            border: 1px solid rgba(100, 150, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        #enter-zen-mode:hover {
            background: rgba(100, 120, 255, 0.9);
            transform: scale(1.1);
        }
        #enter-zen-mode svg {
            width: 14px;
            height: 14px;
            fill: #e0e7ff;
        }

        #exit-zen-mode {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, rgba(10, 15, 40, 0.9), rgba(20, 30, 60, 0.8));
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- === LEAFLET MAP SCRIPT === -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Main variables
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.domElement.style.zIndex = "1";
        const raycaster = new THREE.Raycaster();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        let sunObject;
        let moonObject;
        let wasDragging = false; // Flag to distinguish click from drag

        // Constants
        const skyRadius = 150;
        const horizonRadius = 155;
        const TARGET_FPS = 30;
        const FRAME_INTERVAL = 1000 / TARGET_FPS;

        // === MODIFIED TIME AND LOCATION SETTINGS ===
        let currentTime = new Date();
        currentTime.setHours(21, 0, 0, 0);
        let starVisibilityFactor = 1; 
        
        // Default location (Warsaw)
        let observerLocation = {
            latitude: 52.2297, 
            longitude: 21.0122
        };
        let currentLocationName = "Warsaw";

        // Groups
        const skyGroup = new THREE.Group();
        scene.add(skyGroup);
        const directionsGroup = new THREE.Group();
        skyGroup.add(directionsGroup);
        const planetsGroup = new THREE.Group();
        skyGroup.add(planetsGroup);
        const constellationLinesGroup = new THREE.Group();
        skyGroup.add(constellationLinesGroup);
        const constellationLabelsGroup = new THREE.Group();
        skyGroup.add(constellationLabelsGroup);
        
        let selectedStar = null;
        let highlightRing = null;
        let pulsatingArrowsGroup = null;
        let manuallyOverriddenConstellations = new Set();

        camera.position.set(0, -5, 0); 
        
        // === START OF LOCATION LOGIC SECTION ===

        let locationMap, locationMarker; // Variables for Leaflet map
        // === PRICING (In English) ===
        const CENNIK = {
            "Premium Star (Physical + Digital Certificate + App)": "399 PLN",
            "Bright Star (Physical + Digital Certificate + App)": "109 PLN",
            "Digital Package (PDF + App)": "59 PLN"
        };

        // Function to update location and redraw the sky
        function updateLocation(lat, lon, name) {
            observerLocation.latitude = lat;
            observerLocation.longitude = lon;
            currentLocationName = name;
            
            console.log(`Location changed to: ${name} (${lat.toFixed(4)}, ${lon.toFixed(4)})`);
            
            // Update time display to show the new location
            const hours = currentTime.getHours().toString().padStart(2, '0');
            const minutes = currentTime.getMinutes().toString().padStart(2, '0');
            const displayText = `${currentLocationName}, ${hours}:${minutes}, ${currentTime.toLocaleDateString('en-US')}`;
            document.getElementById('time-display').textContent = displayText;

            // Recalculate everything
            recalculateAllPositions();
        }

        // Helper function to recalculate all positions
        function recalculateAllPositions() {
            updateStarAndConstellationPositions();
            updateCelestialObjects();
            updateSunAndSky();
            loadAndDrawConstellations(); // Must be reloaded to be placed correctly initially
            redrawConstellationLabels();
        }
        
        // Main function to configure the location panel
        function setupLocationModal() {
            const modalOverlay = document.getElementById('location-modal-overlay');
            const openBtn = document.getElementById('open-location-modal');
            const closeBtn = document.getElementById('close-location-modal');
            const useLocationBtn = document.getElementById('use-location-btn');
            const autolocateBtn = document.getElementById('autolocate-btn');
            const searchForm = document.getElementById('location-search-form');
            const searchInput = document.getElementById('location-search');
            
            let tempCoords = { lat: observerLocation.latitude, lng: observerLocation.longitude };
            let tempName = currentLocationName;

            openBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('hidden');
                // Initialize map only on first open
                if (!locationMap) {
                    locationMap = L.map('location-map').setView([observerLocation.latitude, observerLocation.longitude], 6);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                        subdomains: 'abcd',
                        maxZoom: 19
                    }).addTo(locationMap);
                    
                    locationMarker = L.marker([observerLocation.latitude, observerLocation.longitude], { draggable: true }).addTo(locationMap);
                    
                    locationMap.on('click', (e) => {
                        locationMarker.setLatLng(e.latlng);
                        tempCoords = e.latlng;
                        tempName = `Selected Point`;
                    });

                    locationMarker.on('dragend', () => {
                         tempCoords = locationMarker.getLatLng();
                         tempName = `Selected Point`;
                    });
                } else {
                    // If map exists, just update it
                    locationMap.setView([observerLocation.latitude, observerLocation.longitude], locationMap.getZoom());
                    locationMarker.setLatLng([observerLocation.latitude, observerLocation.longitude]);
                }
                tempCoords = { lat: observerLocation.latitude, lng: observerLocation.longitude };
                tempName = currentLocationName;
            });

            closeBtn.addEventListener('click', () => modalOverlay.classList.add('hidden'));
            
            useLocationBtn.addEventListener('click', () => {
                updateLocation(tempCoords.lat, tempCoords.lng, tempName);
                modalOverlay.classList.add('hidden');
            });
            
            autolocateBtn.addEventListener('click', () => {
                 navigator.geolocation.getCurrentPosition(position => {
                    const { latitude, longitude } = position.coords;
                    tempCoords = { lat: latitude, lng: longitude };
                    tempName = "Your Location";
                    locationMap.setView([latitude, longitude], 13);
                    locationMarker.setLatLng([latitude, longitude]);
                 }, () => alert("Could not fetch location."));
            });

            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const query = searchInput.value;
                if (!query) return;

                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            const result = data[0];
                            const lat = parseFloat(result.lat);
                            const lon = parseFloat(result.lon);
                            tempCoords = { lat, lng: lon };
                            tempName = result.display_name.split(',')[0]; // Take the first part of the name
                            locationMap.setView([lat, lon], 10);
                            locationMarker.setLatLng([lat, lon]);
                            searchInput.value = '';
                        } else {
                            alert('Location not found.');
                        }
                    })
                    .catch(() => alert('Error searching for location.'));
            });
        }
        
        // Function to get geolocation on startup
        function requestInitialGeolocation() {
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        // Reverse geocoding to get city name
                        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`)
                            .then(res => res.json())
                            .then(data => {
                                const name = data.address.city || data.address.town || data.address.village || "Your Location";
                                updateLocation(latitude, longitude, name);
                            })
                            .catch(() => {
                                // If geocoding fails, use a default name
                                updateLocation(latitude, longitude, "Your Location");
                            });
                    },
                    (error) => {
                        console.warn(`Could not get geolocation: ${error.message}. Using default location (Warsaw).`);
                        // If user denies or an error occurs, do nothing - default Warsaw will be used.
                        recalculateAllPositions();
                    }
                );
            } else {
                console.warn('Geolocation is not supported by this browser. Using default location (Warsaw).');
                recalculateAllPositions();
            }
        }
        
        // === END OF LOCATION LOGIC SECTION ===


        // --- SHOOTING STARS ---
        const shootingStarCanvas = document.getElementById('shooting-star-canvas');
        const shootingStarCtx = shootingStarCanvas.getContext('2d');
        let activeShootingStars = [];

        function resizeShootingStarCanvas() {
            shootingStarCanvas.width = window.innerWidth;
            shootingStarCanvas.height = window.innerHeight;
        }
        resizeShootingStarCanvas();

        function createShootingStar() {
            const duration = (800 + Math.random() * 1000) * 1.3;
            const startX = Math.random() * shootingStarCanvas.width;
            const start = { x: startX, y: -20 };
            const endX = startX + (Math.random() - 0.5) * shootingStarCanvas.width;
            const endY = shootingStarCanvas.height * (0.1 + Math.random() * 0.5);
            const end = { x: endX, y: endY };
            
            activeShootingStars.push({
                start,
                end,
                startTime: performance.now(),
                duration,
                lineWidth: 2 + Math.random() * 1.5,
            });
        }

        function updateAndDrawShootingStars() {
            shootingStarCtx.clearRect(0, 0, shootingStarCanvas.width, shootingStarCanvas.height);
            const now = performance.now();

            for (let i = activeShootingStars.length - 1; i >= 0; i--) {
                const star = activeShootingStars[i];
                const elapsed = now - star.startTime;
                const progress = elapsed / star.duration;

                if (progress >= 1) {
                    activeShootingStars.splice(i, 1);
                    continue;
                }

                const currentX = star.start.x + (star.end.x - star.start.x) * progress;
                const currentY = star.start.y + (star.end.y - star.start.y) * progress;
                
                const tailLengthFactor = 0.3;
                const tailProgress = Math.max(0, progress - tailLengthFactor * (1 - progress));
                const tailX = star.start.x + (star.end.x - star.start.x) * tailProgress;
                const tailY = star.start.y + (star.end.y - star.start.y) * tailProgress;

                const opacity = Math.min(1.0, (1.0 - progress) * 2);

                const gradient = shootingStarCtx.createLinearGradient(tailX, tailY, currentX, currentY);
                gradient.addColorStop(0, `rgba(255, 255, 220, 0)`);
                gradient.addColorStop(0.7, `rgba(255, 255, 220, ${opacity * 0.5})`);
                gradient.addColorStop(1, `rgba(255, 255, 255, ${opacity})`);

                shootingStarCtx.beginPath();
                shootingStarCtx.moveTo(tailX, tailY);
                shootingStarCtx.lineTo(currentX, currentY);
                shootingStarCtx.strokeStyle = gradient;
                shootingStarCtx.lineWidth = star.lineWidth;
                shootingStarCtx.shadowColor = 'rgba(255, 255, 220, 0.7)';
                shootingStarCtx.shadowBlur = 10;
                shootingStarCtx.stroke();
            }
            shootingStarCtx.shadowBlur = 0;
        }

        // --- FUNCTIONS FOR CREATING CELESTIAL OBJECTS ---
        function createSun() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(128, 128, 0, 128, 128, 128);
            
            gradient.addColorStop(0,    'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.17, 'rgba(255, 245, 220, 1)');
            gradient.addColorStop(0.25, 'rgba(255, 210, 150, 0.4)');
            gradient.addColorStop(0.7,  'rgba(240, 180, 120, 0.1)');
            gradient.addColorStop(1,    'rgba(240, 170, 80, 0)');
            
            context.fillStyle = gradient;
            context.fillRect(0, 0, 256, 256);
            const sunTexture = new THREE.CanvasTexture(canvas);

            const sunMaterial = new THREE.SpriteMaterial({
                map: sunTexture,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true
            });

            const sunSprite = new THREE.Sprite(sunMaterial);
            sunSprite.scale.set(40, 40, 1);
            sunSprite.userData.isSun = true;
            sunSprite.renderOrder = 10;
            
            return sunSprite;
        }

        function createMoon() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const context = canvas.getContext('2d');
            const centerX = 128;
            const centerY = 128;
            const moonRadius = 90; 
            const glowRadius = 128; 

            const glowGradient = context.createRadialGradient(centerX, centerY, moonRadius * 0.7, centerX, centerY, glowRadius);
            glowGradient.addColorStop(0, 'rgba(180, 210, 255, 0.5)'); 
            glowGradient.addColorStop(0.6, 'rgba(140, 170, 220, 0.2)');
            glowGradient.addColorStop(1, 'rgba(100, 120, 150, 0)');
            context.fillStyle = glowGradient;
            context.fillRect(0, 0, 256, 256);

            const surfaceGradient = context.createRadialGradient(centerX, centerY, moonRadius * 0.5, centerX, centerY, moonRadius);
            surfaceGradient.addColorStop(0, 'rgba(230, 230, 235, 1)');
            surfaceGradient.addColorStop(1, 'rgba(160, 160, 170, 1)');
            
            context.beginPath();
            context.arc(centerX, centerY, moonRadius, 0, 2 * Math.PI);
            context.fillStyle = surfaceGradient;
            context.fill();
            
            context.fillStyle = 'rgba(0, 0, 0, 0.15)';
            const seas = [
                {x: 0.4, y: -0.2, r: 0.35}, {x: -0.3, y: 0.3, r: 0.28},
                {x: 0.1, y: 0.5, r: 0.22}, {x: -0.2, y: -0.5, r: 0.18}
            ];
            seas.forEach(sea => {
                context.beginPath();
                context.arc(centerX + sea.x * moonRadius, centerY + sea.y * moonRadius, sea.r * moonRadius, 0, 2 * Math.PI);
                context.fill();
            });
            
            for (let i = 0; i < 15; i++) {
                const x = centerX + (Math.random() - 0.5) * moonRadius * 1.8;
                const y = centerY + (Math.random() - 0.5) * moonRadius * 1.8;
                const r = 4 + Math.random() * 10;
                if (Math.hypot(x - centerX, y - centerY) < moonRadius - r) {
                    context.beginPath();
                    context.arc(x, y, r, 0, 2 * Math.PI);
                    context.fillStyle = 'rgba(0, 0, 0, 0.2)';
                    context.fill();
                    context.beginPath();
                    context.arc(x - 1, y - 1, r, 0, 2 * Math.PI);
                    context.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    context.lineWidth = 1.5;
                    context.stroke();
                }
            }
            
            const moonTexture = new THREE.CanvasTexture(canvas);
            const moonMaterial = new THREE.SpriteMaterial({
                map: moonTexture,
                blending: THREE.NormalBlending,
                depthTest: false,
                transparent: true,
                color: 0xEEEEFF
            });

            const moonSprite = new THREE.Sprite(moonMaterial);
            moonSprite.scale.set(18, 18, 1); 
            moonSprite.renderOrder = 3;
            moonSprite.userData.isMoon = true;

            return moonSprite;
        }

        // --- ASTRONOMICAL FUNCTIONS ---
        function normalizeAngle(angle) {
            let b = angle / 360;
            let a = 360 * (b - Math.floor(b));
            if (a < 0) a += 360;
            return a;
        }

        function getSunPosition(date) {
            const toRad = Math.PI / 180;
            const JD = date.getTime() / 86400000 + 2440587.5;
            const d = JD - 2451545.0;

            const g = normalizeAngle(357.529 + 0.98560028 * d);
            const q = normalizeAngle(280.459 + 0.98564736 * d);
            const L = normalizeAngle(q + 1.915 * Math.sin(g * toRad) + 0.020 * Math.sin(2 * g * toRad));
            
            const e = 23.439 - 0.00000036 * d;
            const eRad = e * toRad;

            let ra = Math.atan2(Math.cos(eRad) * Math.sin(L * toRad), Math.cos(L * toRad)) / toRad;
            if (ra < 0) ra += 360;
            
            const dec = Math.asin(Math.sin(eRad) * Math.sin(L * toRad)) / toRad;

            return { ra, dec };
        }

        function getMoonPosition(date) {
            const toRad = Math.PI / 180;
            const JD = date.getTime() / 86400000 + 2440587.5;
            const d = JD - 2451545.0;

            const L = normalizeAngle(218.316 + 13.176396 * d);
            const M = normalizeAngle(134.963 + 13.064993 * d);
            const F = normalizeAngle(93.272 + 13.229350 * d);

            const l_ = L + 6.289 * Math.sin(M * toRad);
            const b_ = 5.128 * Math.sin(F * toRad);
            
            const e = 23.439 - 0.00000036 * d;
            const eRad = e * toRad;

            const l_rad = l_ * toRad;
            const b_rad = b_ * toRad;

            let ra = Math.atan2(Math.sin(l_rad) * Math.cos(eRad) - Math.tan(b_rad) * Math.sin(eRad), Math.cos(l_rad)) / toRad;
            if (ra < 0) ra += 360;

            const dec = Math.asin(Math.sin(b_rad) * Math.cos(eRad) + Math.cos(b_rad) * Math.sin(eRad) * Math.sin(l_rad)) / toRad;

            return { ra, dec };
        }

        function equatorialToHorizontal(ra, dec, latitude, lst) {
            const raRad = ra * Math.PI / 180;
            const decRad = dec * Math.PI / 180;
            const latRad = latitude * Math.PI / 180;
            const hourAngle = (lst - ra) * Math.PI / 180;
            const sinAlt = Math.sin(decRad) * Math.sin(latRad) + Math.cos(decRad) * Math.cos(latRad) * Math.cos(hourAngle);
            const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt)));
            const cosA = (Math.sin(decRad) - Math.sin(alt) * Math.sin(latRad)) / (Math.cos(alt) * Math.cos(latRad));
            let az = Math.acos(Math.max(-1, Math.min(1, cosA)));

            if (Math.sin(hourAngle) > 0) {
                az = 2 * Math.PI - az;
            }

            return { altitude: alt * 180 / Math.PI, azimuth: az * 180 / Math.PI };
        }
        
        function getLST(date, longitude) {
            const JD = date.getTime() / 86400000 + 2440587.5;
            const T = (JD - 2451545.0) / 36525;
            let GMST = 280.46061837 + 360.98564736629 * (JD - 2451545.0) + 0.000387933 * T * T - T * T * T / 38710000;
            GMST = GMST % 360;
            if (GMST < 0) GMST += 360;
            return (GMST + longitude) % 360;
        }

        function updateCelestialObjects() {
            const lst = getLST(currentTime, observerLocation.longitude);

            if (sunObject) {
                const sunCoords = getSunPosition(currentTime);
                const { altitude, azimuth } = equatorialToHorizontal(sunCoords.ra, sunCoords.dec, observerLocation.latitude, lst);
                sunObject.userData.altitude = altitude;
                
                if (altitude > -5) {
                    sunObject.visible = true;
                    const phi = (90 - altitude) * (Math.PI / 180);
                    const theta = azimuth * (Math.PI / 180); 
                    sunObject.position.set(
                        -skyRadius * Math.sin(phi) * Math.sin(theta),
                        skyRadius * Math.cos(phi),
                        skyRadius * Math.sin(phi) * Math.cos(theta)
                    );
                } else {
                    sunObject.visible = false;
                }
            }

            if (moonObject) {
                const moonCoords = getMoonPosition(currentTime);
                const { altitude, azimuth } = equatorialToHorizontal(moonCoords.ra, moonCoords.dec, observerLocation.latitude, lst);

                if (altitude > -2) {
                    moonObject.visible = true;
                    const phi = (90 - altitude) * (Math.PI / 180);
                    const theta = azimuth * (Math.PI / 180);
                    moonObject.position.set(
                        -skyRadius * Math.sin(phi) * Math.sin(theta),
                        skyRadius * Math.cos(phi),
                        skyRadius * Math.sin(phi) * Math.cos(theta)
                    );

                    let opacity = 1.0;

                    if (altitude >= 0 && altitude < 5) {
                        opacity *= (altitude / 5);
                    } else if (altitude < 0 && altitude >= -2) {
                        opacity = 0;
                    }
                    
                    opacity *= starVisibilityFactor;

                    moonObject.material.opacity = opacity;

                } else {
                    moonObject.visible = false;
                }
            }

                    planetSprite.position.set(
                        -skyRadius * Math.sin(phi) * Math.sin(theta),
                        skyRadius * Math.cos(phi),
                        skyRadius * Math.sin(phi) * Math.cos(theta)
                    );
                } else {
                    planetSprite.visible = false;
                }
            });
        }

        function createConstellationLabel(text, position, size = 1.0) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const fontSize = 32 * size; 
            context.font = `Normal ${fontSize}px 'Segoe UI', Arial, sans-serif`;
            const textWidth = context.measureText(text).width;

            canvas.width = textWidth + (20 * size);
            canvas.height = fontSize + (10 * size);

            context.font = `Normal ${fontSize}px 'Segoe UI', Arial, sans-serif`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillStyle = 'rgba(170, 200, 255, 0.7)';
            context.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });

            const sprite = new THREE.Sprite(material);
            sprite.position.copy(position);

            const scale = canvas.width / 5;
            sprite.scale.set(scale, scale * (canvas.height / canvas.width), 1.0);
            sprite.renderOrder = 950;

            return sprite;
        }

        function loadAndDrawConstellations() {
            fetch('constellations.lines.final.json')
                .then(response => {
                    if (response.ok) return response.json();
                    console.warn("Could not find 'constellations.lines.final.json'. Loading original file...");
                    return fetch('constellations.lines.json').then(res => {
                        if (res.ok) return res.json();
                        return Promise.reject("Critical error: Could not find any constellation lines file.");
                    });
                })
                .then(data => {
                    while(constellationLinesGroup.children.length > 0){ constellationLinesGroup.remove(constellationLinesGroup.children[0]); }
                    
                    const lineMaterial = new THREE.LineBasicMaterial({ color: 0x8CACFF, transparent: true, opacity: 0.5, depthTest: false });
                    const drawnSegments = new Set();

                    data.features.forEach(feature => {
                        feature.geometry.coordinates.forEach(lineSegment => {
                            if(Array.isArray(lineSegment[0]) && lineSegment.length === 2) {
                                const point1_id = `${lineSegment[0][0]},${lineSegment[0][1]}`;
                                const point2_id = `${lineSegment[1][0]},${lineSegment[1][1]}`;
                                const segmentId = [point1_id, point2_id].sort().join('-');

                                if (drawnSegments.has(segmentId)) {
                                    return;
                                }
                                drawnSegments.add(segmentId);

                                const points = lineSegment.map(coord => {
                                    const { altitude, azimuth } = equatorialToHorizontal(coord[0], coord[1], observerLocation.latitude, getLST(currentTime, observerLocation.longitude));
                                    const phi = (90 - altitude) * Math.PI / 180;
                                    const theta = azimuth * Math.PI / 180; 
                                    return new THREE.Vector3(
                                        -skyRadius * Math.sin(phi) * Math.sin(theta),
                                        skyRadius * Math.cos(phi),
                                        skyRadius * Math.sin(phi) * Math.cos(theta)
                                    );
                                });

                                if (points.length > 1) {
                                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                                    const line = new THREE.Line(geometry, lineMaterial.clone());
                                    line.userData.originalCoords = lineSegment.map(c => ({ra: c[0], dec: c[1]}));
                                    line.visible = document.getElementById('constellation-toggle-input').checked;
                                    constellationLinesGroup.add(line);
                                }
                            }
                        });
                    });
                })
                .catch(e => console.error(e));
        }
        
        function updateConstellationLines() {

            const isConstellationVisibleGlobally = document.getElementById('constellation-toggle-input').checked;
            
            constellationLinesGroup.children.forEach(line => {
                const positionAttribute = line.geometry.getAttribute('position');
                
                for (let i = 0; i < line.userData.originalCoords.length; i++) {
                    const coord = line.userData.originalCoords[i];
                    const { altitude, azimuth } = equatorialToHorizontal(coord.ra, coord.dec, observerLocation.latitude, lst);
                    const phi = (90 - altitude) * Math.PI / 180;
                    const theta = azimuth * Math.PI / 180; 
                    positionAttribute.setXYZ(
                        i,
                        -skyRadius * Math.sin(phi) * Math.sin(theta),
                        skyRadius * Math.cos(phi),
                        skyRadius * Math.sin(phi) * Math.cos(theta)
                    );
                }
                
                positionAttribute.needsUpdate = true;
                line.geometry.computeBoundingSphere();
                
                line.visible = isConstellationVisibleGlobally;
            });

        class StellariumControls {
            constructor(camera, domElement) {
                this.camera = camera;
                this.domElement = domElement;
                this.rotationSpeed = 0.3;
                this.dampingFactor = 0.1;
                this.minPolarAngle = Math.PI * 0.05;
                this.maxPolarAngle = Math.PI * 0.95;
                this.isMouseDown = false;
                this.lastMouseX = 0;
                this.lastMouseY = 0;
                this.phi = Math.PI / 2.8; 
                this.theta = 0; 
                this.targetPhi = this.phi;
                this.targetTheta = Math.PI / 12; 
                this.lastTouchDistance = 0;

                this._updateCameraDirection = this._updateCameraDirection.bind(this);
                this._addEventListeners = this._addEventListeners.bind(this);
                this._onMouseDown = this._onMouseDown.bind(this);
                this._onMouseMove = this._onMouseMove.bind(this);
                this._onMouseUp = this._onMouseUp.bind(this);
                this._onMouseWheel = this._onMouseWheel.bind(this);
                this._onTouchStart = this._onTouchStart.bind(this);
                this._onTouchMove = this._onTouchMove.bind(this);
                this._onTouchEnd = this._onTouchEnd.bind(this);
                this.update = this.update.bind(this);
                this.lookAtStar = this.lookAtStar.bind(this);

                this._updateCameraDirection();
                this._addEventListeners();
            }

            _updateCameraDirection() {
                const sinPhiRadius = Math.sin(this.phi);
                const lookDir = new THREE.Vector3(
                    sinPhiRadius * Math.sin(this.theta), 
                    Math.cos(this.phi),
                    sinPhiRadius * Math.cos(this.theta)  
                );
                const lookAt = new THREE.Vector3().copy(camera.position).add(lookDir);
                camera.lookAt(lookAt);
            }

            _addEventListeners() {
               this.domElement.addEventListener('mousedown', this._onMouseDown);
                this.domElement.addEventListener('mousemove', this._onMouseMove);
                document.addEventListener('mouseup', this._onMouseUp);
                this.domElement.addEventListener('wheel', this._onMouseWheel);
                this.domElement.addEventListener('touchstart', this._onTouchStart, { passive: false });
                document.addEventListener('touchmove', this._onTouchMove, { passive: false });
                document.addEventListener('touchend', this._onTouchEnd);
            }

            _onMouseDown(event) {
                wasDragging = false; // Reset flag on mouse down
                this.isMouseDown = true;
                this.lastMouseX = event.clientX;
                this.lastMouseY = event.clientY;
            }

            _onMouseMove(event) {
                if (!this.isMouseDown) return;
                wasDragging = true; // Set flag on mouse move
                const deltaX = event.clientX - this.lastMouseX;
                const deltaY = event.clientY - this.lastMouseY;
                this.targetTheta += deltaX * 0.01 * this.rotationSpeed; 
                this.targetPhi -= deltaY * 0.01 * this.rotationSpeed;
                this.targetPhi = Math.max(this.minPolarAngle, Math.min(this.maxPolarAngle, this.targetPhi));
                this.lastMouseX = event.clientX;
                this.lastMouseY = event.clientY;
            }

            _onMouseUp() {
                this.isMouseDown = false;
            }

            _onMouseWheel(event) {
                event.preventDefault();
                const zoomSpeed = 0.2;
                const delta = Math.sign(event.deltaY);
                camera.fov = Math.max(30, Math.min(90, camera.fov + delta * zoomSpeed * 5));
                camera.updateProjectionMatrix();

        function createStarSprite(star) {
            const ra = parseFloat(star.ra);
            const dec = parseFloat(star.dec);
            const magnitude = parseFloat(star.magnitude);
            const spectralType = star.spectralType;

            if (isNaN(ra) || isNaN(dec) || isNaN(magnitude) || !starTexture) {
                return null;
            }

            const lst = getLST(currentTime, observerLocation.longitude);
            const { altitude, azimuth } = equatorialToHorizontal(ra, dec, observerLocation.latitude, lst);
            const phi = (90 - altitude) * (Math.PI / 180);
            const theta = azimuth * (Math.PI / 180); 
            const x = -skyRadius * Math.sin(phi) * Math.sin(theta);
            const y = skyRadius * Math.cos(phi); 
            const z = skyRadius * Math.sin(phi) * Math.cos(theta); 

            const effectiveMagnitude = Math.max(magnitude, 0.10);

            let baseScale = effectiveMagnitude < 3.0 ?
                20 * Math.pow(0.02666, (effectiveMagnitude + 1.8) / (6.5 + 1.8)) :
                7.5 * Math.pow(0.05332, (effectiveMagnitude + 1.8) / (6.5 + 1.8));

            baseScale = Math.max(0.6, baseScale);
            baseScale *= 1.7;

            let starColor = 0xffffff;
            if (spectralType) {
                const spectralClass = spectralType.charAt(0).toUpperCase();
                starColor = spectralTypeColors[spectralClass] || 0xffffff;
            }
            
            const starGroup = new THREE.Group();
            starGroup.position.set(x, y, z);

            const coreSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                map: starTexture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                opacity: magnitude < 3.0 ? 1.0 : 0.8,
                color: starColor
            }));
            coreSprite.scale.set(baseScale, baseScale, baseScale);
            coreSprite.renderOrder = 1;
            starGroup.add(coreSprite);

            if (glowTexture && magnitude <= 6.01) {
                let glowOpacity, glowScaleMultiplier;

                if (magnitude < 3.75) {
                    glowOpacity = 0.35;
                    glowScaleMultiplier = 1.33;
                } else {
                    glowOpacity = 0.175;
                    glowScaleMultiplier = 0.665;
                }

                const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: glowTexture,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthTest: false,
                    opacity: glowOpacity,
                    color: starColor
                }));
                
                const glowScale = baseScale * glowScaleMultiplier;
                glowSprite.scale.set(glowScale, glowScale, glowScale);
                glowSprite.renderOrder = 0;
                starGroup.add(glowSprite);
            }
            
            starGroup.userData = {
                ...star,
                ra, dec, magnitude, spectralType, baseScale,
                position3D: new THREE.Vector3(x, y, z)
            };

        function updateSunAndSky() {
            const month = currentTime.getMonth() + 1;
            const day = currentTime.getDate();
            const dateKey = `${month}-${day}`;
            const todayTimes = sunriseSunsetData[dateKey];

            if (!todayTimes) {
                console.warn(`No sunrise/sunset data for date: ${dateKey}. Using default values.`);
                 return;
            }

            const [riseHours, riseMinutes] = todayTimes.rise.split(':').map(Number);
            const [setHours, setMinutes] = todayTimes.set.split(':').map(Number);
            const sunriseTime = new Date(currentTime);
            sunriseTime.setHours(riseHours, riseMinutes, 0, 0);
            const sunsetTime = new Date(currentTime);
            sunsetTime.setHours(setHours, setMinutes, 0, 0);

            const transitionMinutes = 80;
            const duskStart = new Date(sunsetTime.getTime() - (transitionMinutes / 2) * 60000);
            const duskEnd = new Date(sunsetTime.getTime() + (transitionMinutes / 2) * 60000);
            const dawnStart = new Date(sunriseTime.getTime() - (transitionMinutes / 2) * 60000);
            const dawnEnd = new Date(sunriseTime.getTime() + (transitionMinutes / 2) * 60000);

            const colors = {
                day: { top: new THREE.Color(0x4A90E2), mid: new THREE.Color(0x7CB9E8), bottom: new THREE.Color(0xB3DDF2), horizon: new THREE.Color(1, 1, 1) },
                dusk: { top: new THREE.Color(0x0e1a3b), mid: new THREE.Color(0x1f2a4c), bottom: new THREE.Color(0x3c4a6c), horizon: new THREE.Color(0.2, 0.2, 0.3) },
                night: {
                    top: new THREE.Color(0x080D20),    
                    mid: new THREE.Color(0x101430),    
                    bottom: new THREE.Color(0x1A1F40), 
                    horizon: new THREE.Color(0.35, 0.35, 0.4) 
                }
            };

            function getInterpolationFactor(start, end) {
                const now = currentTime.getTime();
                const startTime = start.getTime();
                const endTime = end.getTime();
                if (now <= startTime) return 0;
                if (now >= endTime) return 1;
                return (now - startTime) / (endTime - startTime);
            }

            let fromPalette, toPalette, factor;

            if (currentTime > dawnEnd && currentTime < duskStart) { // Day
                fromPalette = toPalette = colors.day;
                factor = 1;
                starVisibilityFactor = 0;
            } else if (currentTime >= duskStart && currentTime < duskEnd) { // Dusk
                fromPalette = colors.day;
                toPalette = colors.night;
                factor = getInterpolationFactor(duskStart, duskEnd);
                starVisibilityFactor = factor;
            } else if (currentTime >= dawnStart && currentTime < dawnEnd) { // Dawn
                fromPalette = colors.night;
                toPalette = colors.day;
                factor = getInterpolationFactor(dawnStart, dawnEnd);
                starVisibilityFactor = 1.0 - factor;
            } else { // Night
                fromPalette = toPalette = colors.night;
                factor = 1;
                starVisibilityFactor = 1;
            }

            sky.material.uniforms.topColor.value.lerpColors(fromPalette.top, toPalette.top, factor);
            sky.material.uniforms.midColor.value.lerpColors(fromPalette.mid, toPalette.mid, factor);
            sky.material.uniforms.bottomColor.value.lerpColors(fromPalette.bottom, toPalette.bottom, factor);
            if (horizon) {
                horizon.material.color.lerpColors(fromPalette.horizon, toPalette.horizon, factor);
            }
            
            updateStarVisibility(starVisibilityFactor);
        }

        function updateStarVisibility(visibilityFactor) {
            starsArray.forEach(starGroup => {
                starGroup.children.forEach(star => {
                    const magnitude = starGroup.userData.magnitude;
                    let baseOpacity = 1.0;
                    if (star.material.map === starTexture) {
                        baseOpacity = magnitude < 3.0 ? 1.0 : 0.8;
                    } else if (star.material.map === glowTexture) {
                        baseOpacity = 0.5;
                    }
                    
                    const appearanceThreshold = Math.max(0, Math.min(1, (magnitude + 1.5) / 7.6));
                    
                    let opacity = 0;
                    if (visibilityFactor > appearanceThreshold) {
                        const denominator = 1.0 - appearanceThreshold;
                        if (denominator > 0.0001) {
                            const opacityFactor = (visibilityFactor - appearanceThreshold) / denominator;
                            opacity = baseOpacity * opacityFactor;
                        } else {
                            opacity = baseOpacity;
                        }
                    }

                    star.material.opacity = Math.min(baseOpacity, Math.max(0, opacity));
                    star.material.needsUpdate = true;
                });
            });
        }

       function createPulsatingArrows(targetStar) {
            if (pulsatingArrowsGroup) {
                skyGroup.remove(pulsatingArrowsGroup);
                pulsatingArrowsGroup = null;
            }

            pulsatingArrowsGroup = new THREE.Group();
            const arrowShape = new THREE.Shape();
            arrowShape.moveTo(0, 0);
            arrowShape.lineTo(-0.3, -1);
            arrowShape.lineTo(0.3, -1);
            arrowShape.closePath();

            const arrowGeometry = new THREE.ShapeGeometry(arrowShape);
            const arrowMaterial = new THREE.MeshBasicMaterial({
                color: 0xFFFFFF,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.8,
                depthTest: false
            });
            
            const baseScale = targetStar.children[0] ? targetStar.children[0].scale.x : 1.0;
            const offset = baseScale * 0.8;

            const arrowUp = new THREE.Mesh(arrowGeometry, arrowMaterial.clone());
            arrowUp.position.set(0, offset, 0);
            arrowUp.rotation.z = Math.PI;

            const arrowDown = new THREE.Mesh(arrowGeometry, arrowMaterial.clone());
            arrowDown.position.set(0, -offset, 0);
            arrowDown.rotation.z = 0;

            const arrowLeft = new THREE.Mesh(arrowGeometry, arrowMaterial.clone());
            arrowLeft.position.set(-offset, 0, 0);
            arrowLeft.rotation.z = -Math.PI / 2;

            const arrowRight = new THREE.Mesh(arrowGeometry, arrowMaterial.clone());
            arrowRight.position.set(offset, 0, 0);
            arrowRight.rotation.z = Math.PI / 2;

            [arrowUp, arrowDown, arrowLeft, arrowRight].forEach(arrow => {
                arrow.scale.set(1.2, 1.2, 1.2);
            });

            pulsatingArrowsGroup.add(arrowUp, arrowDown, arrowLeft, arrowRight);
            skyGroup.add(pulsatingArrowsGroup);
        }

        function updatePulsatingArrows() {
            if (pulsatingArrowsGroup && selectedStar) {
                const pulse = 1.0 + 0.05 * Math.sin(performance.now() * 0.002);
                pulsatingArrowsGroup.scale.set(pulse, pulse, pulse);
                pulsatingArrowsGroup.position.copy(selectedStar.position);
                pulsatingArrowsGroup.lookAt(camera.position);
                pulsatingArrowsGroup.visible = true; 
            }
        }

        let isFirstRender = true;

        function updateStars() {
            const frustum = new THREE.Frustum();
            const cameraViewProjectionMatrix = new THREE.Matrix4();
            cameraViewProjectionMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
            frustum.setFromProjectionMatrix(cameraViewProjectionMatrix);

            starsArray.forEach(starGroup => {
                const magnitude = starGroup.userData.magnitude;

                if (magnitude > 5.0 && camera.fov > 70) {
                    starGroup.visible = false;
                    return;
                }

                starGroup.visible = isFirstRender ? true : frustum.containsPoint(starGroup.position);

                if (starGroup.visible) {
                    const zoomFactor = magnitude < 3.0 ?
                        Math.log(1 + (90 - camera.fov) / 30) :
                        (90 - camera.fov) / 30;
                    const scale = starGroup.userData.baseScale * (1 + zoomFactor);
                    
                    starGroup.children.forEach(child => {
                        if (child.material.map === glowTexture) {
                            const glowScaleMultiplier = (magnitude < 3.75) ? 1.33 : 0.665;
                            const glowScale = scale * glowScaleMultiplier;
                            child.scale.set(glowScale, glowScale, glowScale);
                        } else {
                            child.scale.set(scale, scale, scale);
                        }
                    });
                }
            });

            if (camera.fov > 50 && highlightRing) {
                skyGroup.remove(highlightRing);
                highlightRing = null;
            }
            
            isFirstRender = false;
        }

            if (!supportsDatetimeLocal || isMobile) {
                datetimePicker.style.display = 'none';
                fallbackPicker.style.display = 'block';
            }

            const formatDateTimeLocal = (date) => {
                const pad = (num) => num.toString().padStart(2, '0');
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
            };
            const formatDate = (date) => {
                const pad = (num) => num.toString().padStart(2, '0');
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
            };
            const formatTime = (date) => {
                const pad = (num) => num.toString().padStart(2, '0');
                return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
            };

            const updateTime = (selectedDateTime, updateSlider = true) => {
                if (!isNaN(selectedDateTime)) {
                    currentTime = selectedDateTime;
                    const hours = currentTime.getHours().toString().padStart(2, '0');
                    const minutes = currentTime.getMinutes().toString().padStart(2, '0');
                    // MODIFIED: Uses the `currentLocationName` variable
                    const displayText = `${currentLocationName}, ${hours}:${minutes}`;
                    timeDisplay.textContent = displayText;
                    
                    if (updateSlider) {
                        hourSlider.value = currentTime.getHours() * 60 + currentTime.getMinutes();
                    }
                    
                    updateStarAndConstellationPositions();
                    updateCelestialObjects();
                    updateSunAndSky();
                }
            };
            
            datetimePicker.value = formatDateTimeLocal(currentTime);
            datePicker.value = formatDate(currentTime);
            timePickerFallback.value = formatTime(currentTime);
            hourSlider.value = currentTime.getHours() * 60 + currentTime.getMinutes();
            updateTime(currentTime);

            const updateFromSlider = () => {
                const totalMinutes = parseInt(hourSlider.value);
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                
                const date = new Date(currentTime);
                date.setHours(hours, minutes);
                
                datetimePicker.value = formatDateTimeLocal(date);
                datePicker.value = formatDate(date);
                timePickerFallback.value = formatTime(date);
                updateTime(date, false);
            };
            
            hourSlider.addEventListener('input', updateFromSlider);

            datetimePicker.addEventListener('change', () => {
                const selectedDateTime = new Date(datetimePicker.value);
                updateTime(selectedDateTime);
            });

            datePicker.addEventListener('change', () => {
                const date = new Date(datePicker.value);

                updateTime(date);
            });

                const date = new Date(datePicker.value);
                const time = timePickerFallback.value.split(':');

            });

                const now = new Date();
                datetimePicker.value = formatDateTimeLocal(now);
                datePicker.value = formatDate(now);
                timePickerFallback.value = formatTime(now);
                updateTime(now);
            });
        }

        function handleInteraction(x, y) {
            const mouse = new THREE.Vector2(
                (x / window.innerWidth) * 2 - 1,
                -(y / window.innerHeight) * 2 + 1
            );

            const CLICK_THRESHOLD = 0.14; 
            let closestStar = null;
            let minDistanceSq = Infinity;

            for (const starObject of starsArray) {
                if (!starObject.visible || starObject.userData.magnitude > 6.1) continue;

                const screenPos = starObject.position.clone().project(camera);
                const distanceSq = Math.pow(screenPos.x - mouse.x, 2) + Math.pow(screenPos.y - mouse.y, 2);

                if (distanceSq < minDistanceSq) {
                    minDistanceSq = distanceSq;
                    closestStar = starObject;
                }
            }

            if (closestStar && minDistanceSq < (CLICK_THRESHOLD * CLICK_THRESHOLD)) {
                document.getElementById('star-image').style.display = 'none';
                
                if (selectedStar === closestStar && document.getElementById('info').style.display === 'block') {
                    selectedStar = null;
                    document.getElementById('info').style.display = 'none';
                    if (pulsatingArrowsGroup) {
                        skyGroup.remove(pulsatingArrowsGroup);
                        pulsatingArrowsGroup = null;
                    }
                } else {
                    selectedStar = closestStar;
                    showInfo(selectedStar);
                    createPulsatingArrows(selectedStar);
                }
            } else {
                selectedStar = null;
                document.getElementById('info').style.display = 'none';
                document.getElementById('star-image').style.display = 'none';
                if (pulsatingArrowsGroup) {
                    skyGroup.remove(pulsatingArrowsGroup);
                    pulsatingArrowsGroup = null;
                }
            }
        }
